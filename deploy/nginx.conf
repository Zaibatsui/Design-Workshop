# Forward any X-Forwarded-Proto / X-Forwarded-Host the upstream proxy
# already set, falling back to the request's own scheme/host when absent.
# This is critical for OAuth: the backend's ForwardedHostMiddleware uses
# these headers to rewrite the ASGI scope so request.url_for() resolves
# to the public hostname instead of the docker network's internal name.
map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_x_forwarded_host $proxy_forwarded_host {
    default $http_x_forwarded_host;
    ''      $host;
}

server {
    listen 80;
    server_name _;

    # 12MB cap = backend's 10MB upload limit + a little slack for headers.
    client_max_body_size 12M;

    # Serve the React SPA.
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the immutable, content-hashed CRA assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicon, manifest, robots — short-cache so we can change them without
    # waiting for browsers to expire stale copies.
    location ~* \.(?:ico|svg|png|jpg|jpeg|webp|gif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Reverse-proxy the API to the backend service on the docker network.
    # `^~` makes this prefix match win over any regex `location ~*` block
    # below — without it, requests like `/api/files/foo.png` get caught by
    # the static-asset regex and 404'd before ever reaching the backend.
    location ^~ /api/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
        proxy_set_header Connection "";

        # Don't buffer responses — file downloads and SSE-ish endpoints
        # need to stream as soon as bytes arrive.
        proxy_buffering off;
        proxy_request_buffering off;

        # Generous timeout for the Playwright scraper fallback.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback — every non-/api, non-static path returns index.html so
    # client-side React Router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
